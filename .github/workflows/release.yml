name: Release

on:
  release:
    types: [prereleased, edited, published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        run: cd web && npm install --legacy-peer-deps && npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: Go Mod Tidy
        working-directory: ./server
        run: go mod tidy

      - name: Build Binaries
        working-directory: ./server
        run: |
          GOOS=darwin GOARCH=amd64 go build -o gshark_darwin_amd64
          GOOS=darwin GOARCH=arm64 go build -o gshark_darwin_arm64
          GOOS=windows GOARCH=amd64 go build -o gshark_windows_amd64.exe
          GOOS=linux GOARCH=amd64 go build -o gshark_linux_amd64

      - name: Prepare Release Directories
        run: |
          for platform in darwin_amd64 darwin_arm64 windows_amd64 linux_amd64; do
            mkdir -p "release/gshark_${platform}"
            cp ./server/config-temp.yaml "release/gshark_${platform}/config.yaml"
            cp -rf ./server/resource "release/gshark_${platform}/"
            cp -rf ./web/dist "release/gshark_${platform}/"
          done

      - name: Move Binaries
        run: |
          cp ./server/gshark_darwin_amd64 release/gshark_darwin_amd64/gshark
          cp ./server/gshark_darwin_arm64 release/gshark_darwin_arm64/gshark
          cp ./server/gshark_windows_amd64.exe release/gshark_windows_amd64/gshark.exe
          cp ./server/gshark_linux_amd64 release/gshark_linux_amd64/gshark

      - name: Compress
        run: |
          cd release
          for platform in darwin_amd64 darwin_arm64 windows_amd64 linux_amd64; do
            cd "gshark_${platform}" && 7z a -r "../gshark_${platform}.zip" . && cd ..
          done

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./release/*.zip
